name: peoplefirst_bottom_nav
description: PeopleFirst floating glassmorphic bottom navigation bar — Flutter component.
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10+1   # SVG icon rendering

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # ── Fonts ──────────────────────────────────────────────────────────────────
  fonts:
    - family: JioType
      fonts:
        - asset: Font/JioType-Medium.ttf
          weight: 500
        - asset: Font/JioType-Bold.ttf
          weight: 700
        - asset: Font/JioType-Black.ttf
          weight: 900

  # ── Assets ─────────────────────────────────────────────────────────────────
  assets:
    - assets/svg/
    - assets/
