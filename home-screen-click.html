<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=360, initial-scale=1.0" />
  <title>PeopleFirst – Home</title>
  <style>
    @font-face {
      font-family: 'JioType';
      src: url('Font/JioType-Medium.ttf') format('truetype');
      font-weight: 500;
    }
    @font-face {
      font-family: 'JioType';
      src: url('Font/JioType-Bold.ttf') format('truetype');
      font-weight: 700;
    }
    @font-face {
      font-family: 'JioType';
      src: url('Font/JioType-Black.ttf') format('truetype');
      font-weight: 900;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:        #0078AD;
      --grey-80:      rgba(0,0,0,0.65);
      --active-bg:    rgba(214,225,236,0.80);
      --nav-bg:       rgba(255,255,255,0.80);
      --font:         'JioType', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #b0bec5;
      font-family: var(--font);
    }

    /* ── Phone frame ────────────────────────────────────────── */
    .phone {
      position: relative;
      width: 360px;
      height: 800px;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(0,0,0,0.08);
    }

    /* ── Scrollable background image ───────────────────────── */
    .scroll-container {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    .bg-image {
      display: block;
      width: 360px;
      height: auto;
    }

    /* ── Footer gradient fade ───────────────────────────────── */
    .footer-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 126px;
      background: linear-gradient(to bottom, rgba(0,27,58,0) 0%, rgba(0,27,58,0.10) 100%);
      pointer-events: none;
      z-index: 10;
    }

    /* ── Glass nav bar — exact Figma colors ──────────────── */
    .footer-nav {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(calc(-50% + 0.5px));
      width: 344px;
      height: 62px;
      border-radius: 80px;

      background: rgba(255,255,255,0.64);
      backdrop-filter: blur(28px) saturate(200%);
      -webkit-backdrop-filter: blur(28px) saturate(200%);
      border: 1px solid rgba(255,255,255,0.75);
      box-shadow: 0 8px 32px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.9);
      overflow: visible;

      z-index: 20;
    }

    /* ── Active pill ────────────────────────────────────────── */
    .nav-active-bg {
      position: absolute;
      top: 6px;
      left: 6px;
      width: 78px;
      height: 50px;
      border-radius: 100px;
      background: rgba(163,182,203,0.5);
      backdrop-filter: blur(12px) saturate(160%);
      -webkit-backdrop-filter: blur(12px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
      will-change: left, transform;
      z-index: 0;
      pointer-events: none;
    }


    /* ── Nav slots ──────────────────────────────────────────── */
    .nav-slot {
      position: absolute;
      top: 8px;
      height: 46px;
      width: 37px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      z-index: 1;
    }
    .nav-slot[data-tab="home"]       { left: 17px; }
    .nav-slot[data-tab="attendance"] { left: 85px; }
    .nav-slot[data-tab="payroll"]    { left: 152px; }
    .nav-slot[data-tab="reimburse"]  { left: 219px; }
    .nav-slot[data-tab="menu"]       { left: 286px; }

    .nav-slot svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1), color 0.18s;
    }
    .nav-slot .nav-label {
      font-family: var(--font);
      font-size: 10px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.055px;
      white-space: nowrap;
      transition: color 0.2s;
    }

    .nav-slot svg, .nav-slot .nav-label { color: var(--grey-80); }
    .nav-slot.active svg        { color: var(--brand); transform: scale(1.18); }
    .nav-slot.active .nav-label { color: var(--brand); }

    .nav-slot { overflow: visible; }
    .nav-slot svg { width: 24px; height: 24px; flex-shrink: 0; transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1), color 0.18s; }
  </style>
</head>

<script>
  // Pill left-edge positions (pill width=68px, centred over each icon slot)
  const PILL_POS = { home:6, attendance:63, payroll:130, reimburse:197, menu:264 };
  const TABS = ['home','attendance','payroll','reimburse','menu'];

  const pill  = document.getElementById('activePill');
  const nav   = document.getElementById('bottomNav');
  const slots = document.querySelectorAll('.nav-slot');

  const STIFFNESS = 320, DAMPING = 34;
  let px = PILL_POS.home, pvx = 0, tx = PILL_POS.home;
  let rafId = null, lastT = null;

  function setActive(tab) {
    slots.forEach(s => s.classList.toggle('active', s.dataset.tab === tab));
  }

  function applyPill(left, vel, distDx) {
    const dStretch = Math.min(Math.abs(distDx) * 0.010, 1.0);
    const vStretch = Math.min(Math.abs(vel)    * 0.002, 0.45);
    const sX = 1 + dStretch + vStretch;
    const sY = 1 / Math.sqrt(sX);

    pill.style.transformOrigin = '50% 50%';
    pill.style.left      = left + 'px';
    pill.style.transform = `scaleX(${sX.toFixed(4)}) scaleY(${sY.toFixed(4)})`;
  }

  function tick(now) {
    const dt = Math.min((now - (lastT || now)) / 1000, 0.032);
    lastT = now;

    const dx = px - tx;
    pvx += (-STIFFNESS * dx - DAMPING * pvx) * dt;
    px  += pvx * dt;

    applyPill(px, pvx, dx);

    if (Math.abs(dx) < 0.15 && Math.abs(pvx) < 0.5) {
      px = tx; pvx = 0;
      applyPill(tx, 0, 0);
      pill.style.zIndex = '0';
      rafId = null;
      return;
    }
    rafId = requestAnimationFrame(tick);
  }

  function springTo(tab) {
    tx = PILL_POS[tab];
    setActive(tab);
    pill.style.zIndex = '0';
    if (!rafId) { lastT = null; rafId = requestAnimationFrame(tick); }
  }

  slots.forEach(slot => {
    slot.addEventListener('click', () => springTo(slot.dataset.tab));
  });
</script>
